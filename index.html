<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADITYA TRADING AI</title>
    <style>
        body {
            background-color: #0d0e15;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #171825;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            border: 1px solid #2a2b3d;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .bot-logo {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid #7b61ff;
        }
        .title {
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        .subtitle {
            font-size: 11px;
            color: #8f92a1;
        }
        .card {
            background: #171825;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #2a2b3d;
            text-align: center;
        }
        .option-btn {
            background: #222436;
            border: 1px solid #3a3c56;
            border-radius: 12px;
            padding: 15px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
            width: 100%;
            box-sizing: border-box;
            color: white;
            font-size: 14px;
        }
        .option-btn:hover {
            border-color: #7b61ff;
            background: #2a2c42;
        }
        .option-icon {
            font-size: 22px;
            margin-right: 15px;
        }
        input[type="file"] {
            display: none;
        }
        .btn {
            background: linear-gradient(135deg, #7b61ff, #5a3fd9);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
        }
        .btn:active {
            transform: scale(0.98);
        }
        #screen-loading, #screen-result {
            display: none;
        }
        .loader-text {
            color: #b8b9c5;
            margin: 20px 0;
            font-size: 14px;
            min-height: 40px;
        }
        .result-box {
            background: #12131c;
            border-radius: 12px;
            padding: 20px;
            margin-top: 15px;
            border: 1px solid #2a2b3d;
        }
        .signal-up {
            font-size: 28px;
            font-weight: 800;
            color: #0ecb81;
            margin: 10px 0;
        }
        .signal-down {
            font-size: 28px;
            font-weight: 800;
            color: #f6465d;
            margin: 10px 0;
        }
        .accuracy {
            color: #b8b9c5;
            font-size: 14px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <img src="logo.png" alt="Logo" class="bot-logo">
            <div>
                <div class="title">ADITYA TRADING AI</div>
                <div class="subtitle">⚡ AI SIGNAL ACTIVE</div>
            </div>
        </div>
        <div style="font-size: 12px; background: #222436; padding: 4px 8px; border-radius: 6px;">OTC</div>
    </div>

    <!-- STEP 1: UPLOAD SCREEN -->
    <div id="screen-upload" class="card">
        <div style="font-size: 14px; margin-bottom: 15px; color: #b8b9c5;">AUD/CAD OTC (+92%)</div>
        
        <!-- OPTION 1: Direct Camera -->
        <label for="cameraInput" class="option-btn">
            <span class="option-icon">📸</span>
            <div>
                <strong>Take Photo (Direct Camera)</strong>
                <div style="font-size: 11px; color: #8f92a1; margin-top: 2px;">Capture chart using camera</div>
            </div>
        </label>
        <input type="file" id="cameraInput" accept="image/*" capture="environment">

        <!-- OPTION 2: Choose from Gallery -->
        <label for="galleryInput" class="option-btn">
            <span class="option-icon">📂</span>
            <div>
                <strong>Upload File (From Gallery)</strong>
                <div style="font-size: 11px; color: #8f92a1; margin-top: 2px;">Select existing screenshot</div>
            </div>
        </label>
        <input type="file" id="galleryInput" accept="image/*">
    </div>

    <!-- STEP 2: LOADING SCREEN -->
    <div id="screen-loading" class="card">
        <h3>🤖 Processing...</h3>
        <div class="loader-text" id="loadingStatus">Connecting to secure neural network...</div>
    </div>

    <!-- STEP 3: RESULT SCREEN -->
    <div id="screen-result" class="card">
        <div style="font-size: 13px; color: #8f92a1; text-transform: uppercase; letter-spacing: 1px;">Forecast Ready</div>
        
        <div class="result-box">
            <div id="signalText">🟢 UP</div>
            <div class="accuracy" id="accuracyText">Accuracy: 93.45%</div>
            <div style="font-size: 13px; background: #1a1b29; padding: 8px; border-radius: 6px; color: #e1e2ef;">
                ⏳ Expiry: 1 Minute
            </div>
        </div>

        <button class="btn" onclick="resetApp()">New Analysis</button>
    </div>
</div>

<script>
    // Robust event listeners jo file select hote hi turant trigger honge
    document.getElementById('cameraInput').addEventListener('change', function() {
        if (this.files.length > 0) {
            startAnalysis();
        }
    });

    document.getElementById('galleryInput').addEventListener('change', function() {
        if (this.files.length > 0) {
            startAnalysis();
        }
    });

    function startAnalysis() {
        document.getElementById('screen-upload').style.display = 'none';
        document.getElementById('screen-loading').style.display = 'block';

        const statuses = [
            "Connecting to secure neural network...",
            "Extracting candle sticks and market patterns...",
            "Analyzing support and resistance zones...",
            "Calculating volume and momentum shifts...",
            "Running quantum probability algorithms...",
            "Synthesizing final high-accuracy signal..."
        ];

        let index = 0;
        const statusElement = document.getElementById('loadingStatus');
        statusElement.innerText = statuses[index];

        let interval = setInterval(() => {
            index++;
            if (index < statuses.length) {
                statusElement.innerText = statuses[index];
            } else {
                clearInterval(interval);
                showResult();
            }
        }, 2000); 
    }

    function showResult() {
        document.getElementById('screen-loading').style.display = 'none';
        document.getElementById('screen-result').style.display = 'block';

        const randomAcc = (Math.random() * (98.8 - 91.2) + 91.2).toFixed(2);
        const directions = ["UP", "DOWN"];
        const chosenSignal = directions[Math.floor(Math.random() * directions.length)];
        
        const signalElement = document.getElementById('signalText');
        
        if(chosenSignal === "DOWN") {
            signalElement.innerText = "🔴 DOWN";
            signalElement.className = "signal-down";
        } else {
            signalElement.innerText = "🟢 UP";
            signalElement.className = "signal-up";
        }

        document.getElementById('accuracyText').innerText = `Accuracy: ${randomAcc}%`;
    }

    function resetApp() {
        document.getElementById('screen-result').style.display = 'none';
        document.getElementById('screen-upload').style.display = 'block';
        document.getElementById('cameraInput').value = ""; 
        document.getElementById('galleryInput').value = ""; 
    }
</script>

</body>
</html>
