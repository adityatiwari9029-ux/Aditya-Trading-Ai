<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADITYA TRADING AI</title>
    <style>
        body {
            background-color: #0d0e15;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #171825;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            border: 1px solid #2a2b3d;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .bot-logo {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid #7b61ff;
        }
        .title {
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        .subtitle {
            font-size: 11px;
            color: #8f92a1;
        }
        .card {
            background: #171825;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #2a2b3d;
            text-align: center;
        }
        .option-btn {
            background: #222436;
            border: 1px solid #3a3c56;
            border-radius: 12px;
            padding: 15px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
            width: 100%;
            box-sizing: border-box;
            color: white;
            font-size: 14px;
        }
        .option-btn:hover {
            border-color: #7b61ff;
            background: #2a2c42;
        }
        .option-icon {
            font-size: 22px;
            margin-right: 15px;
        }
        input[type="file"] {
            display: none;
        }
        .btn {
            background: linear-gradient(135deg, #7b61ff, #5a3fd9);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 15px;
            font-size: 14px;
        }
        .btn:active {
            transform: scale(0.98);
        }
        #screen-loading, #screen-result {
            display: none;
        }

        /* --- SCANNER ANIMATION STYLES --- */
        .scanner-container {
            position: relative;
            width: 100%;
            height: 220px;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 1px solid #3a3c56;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #previewImage {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
        }
        .laser-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: #ff0055;
            box-shadow: 0 0 15px #ff0055, 0 0 30px #ff0055;
            animation: scanAnimation 1.5s linear infinite;
        }
        @keyframes scanAnimation {
            0% { top: 0%; }
            50% { top: 98%; }
            100% { top: 0%; }
        }
        .loader-text {
            color: #ff3366;
            font-weight: 700;
            margin: 10px 0;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        .result-box {
            background: #12131c;
            border-radius: 12px;
            padding: 20px;
            margin-top: 15px;
            border: 1px solid #2a2b3d;
        }
        .signal-up {
            font-size: 28px;
            font-weight: 800;
            color: #0ecb81;
            margin: 10px 0;
        }
        .signal-down {
            font-size: 28px;
            font-weight: 800;
            color: #f6465d;
            margin: 10px 0;
        }
        .accuracy {
            color: #b8b9c5;
            font-size: 14px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <img src="logo.png" alt="Logo" class="bot-logo">
            <div>
                <div class="title">ADITYA TRADING AI</div>
                <div class="subtitle">⚡ AI SIGNAL ACTIVE</div>
            </div>
        </div>
        <div style="font-size: 12px; background: #222436; padding: 4px 8px; border-radius: 6px;">OTC</div>
    </div>

    <!-- STEP 1: UPLOAD SCREEN -->
    <div id="screen-upload" class="card">
        <div style="font-size: 14px; margin-bottom: 15px; color: #b8b9c5;">AUD/CAD OTC (+92%)</div>
        
        <label for="cameraInput" class="option-btn">
            <span class="option-icon">📸</span>
            <div>
                <strong>Take Photo (Direct Camera)</strong>
                <div style="font-size: 11px; color: #8f92a1; margin-top: 2px;">Capture chart using camera</div>
            </div>
        </label>
        <input type="file" id="cameraInput" accept="image/*" capture="environment">

        <label for="galleryInput" class="option-btn">
            <span class="option-icon">📂</span>
            <div>
                <strong>Upload File (From Gallery)</strong>
                <div style="font-size: 11px; color: #8f92a1; margin-top: 2px;">Select existing screenshot</div>
            </div>
        </label>
        <input type="file" id="galleryInput" accept="image/*">
    </div>

    <!-- STEP 2: SCANNING & LOADING SCREEN -->
    <div id="screen-loading" class="card">
        <div class="scanner-container">
            <img id="previewImage" src="" alt="Scanning Chart">
            <div class="laser-line"></div>
        </div>
        <div class="loader-text" id="loadingStatus">Analyzing candles...</div>
        <div style="font-size: 12px; color: #8f92a1;">AI neural network processing image data...</div>
    </div>

    <!-- STEP 3: RESULT SCREEN -->
    <div id="screen-result" class="card">
        <div style="font-size: 13px; color: #8f92a1; text-transform: uppercase; letter-spacing: 1px;">Forecast Ready</div>
        
        <div class="result-box">
            <div id="signalText">🟢 UP</div>
            <div class="accuracy" id="accuracyText">Accuracy: 93.45%</div>
            <div style="font-size: 13px; background: #1a1b29; padding: 8px; border-radius: 6px; color: #e1e2ef;">
                ⏳ Expiry: 1 Minute
            </div>
        </div>

        <button class="btn" onclick="resetApp()">New Analysis</button>
    </div>
</div>

<script>
    document.getElementById('cameraInput').addEventListener('change', function(e) {
        handleFileSelection(e.target.files[0]);
    });

    document.getElementById('galleryInput').addEventListener('change', function(e) {
        handleFileSelection(e.target.files[0]);
    });

    function handleFileSelection(file) {
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            document.getElementById('previewImage').src = event.target.result;
            startScanningProcess();
        }
        reader.readAsDataURL(file);
    }

    function startScanningProcess() {
        document.getElementById('screen-upload').style.display = 'none';
        document.getElementById('screen-loading').style.display = 'block';

        const statuses = [
            "Analyzing candles...",
            "Calculating trend momentum...",
            "Generating signal..."
        ];

        let index = 0;
        const statusElement = document.getElementById('loadingStatus');
        statusElement.innerText = statuses[index];
        
        let interval = setInterval(() => {
            index++;
            if (index < statuses.length) {
                statusElement.innerText = statuses[index];
            } else {
                clearInterval(interval);
                showResult();
            }
        }, 2000); // Har 2 second mein status change hoga (Total exactly 6 seconds)
    }

    function showResult() {
        document.getElementById('screen-loading').style.display = 'none';
        document.getElementById('screen-result').style.display = 'block';

        const randomAcc = (Math.random() * (98.5 - 91.5) + 91.5).toFixed(2);
        const directions = ["UP", "DOWN"];
        const chosenSignal = directions[Math.floor(Math.random() * directions.length)];
        
        const signalElement = document.getElementById('signalText');
        
        if(chosenSignal === "DOWN") {
            signalElement.innerText = "🔴 DOWN";
            signalElement.className = "signal-down";
        } else {
            signalElement.innerText = "🟢 UP";
            signalElement.className = "signal-up";
        }

        document.getElementById('accuracyText').innerText = `Accuracy: ${randomAcc}%`;
    }

    function resetApp() {
        document.getElementById('screen-result').style.display = 'none';
        document.getElementById('screen-upload').style.display = 'block';
        document.getElementById('cameraInput').value = ""; 
        document.getElementById('galleryInput').value = ""; 
    }
</script>

</body>
</html>
